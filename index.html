<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestro Universo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ==========================================================================
       1. PANTALLA DE BIENVENIDA (CAPA INICIAL)
       ========================================================================== -->
    <div id="bienvenida">
        <div class="contenido-bienvenida">
            <h1>Nuestro Universo</h1>
            <p>Un pequeño espacio en el cosmos dedicado a nosotros.</p>
            <button id="btn-entrar">Viajar al espacio</button>
        </div>
    </div>

    <!-- ==========================================================================
       2. ENTORNO DE RENDERIZADO 3D (THREE.JS)
       ========================================================================== -->
    <div id="canvas-container"></div>

    <!-- ==========================================================================
       3. VENTANA DE RECUERDOS - MODAL
       ========================================================================== -->
    <div id="modal-recuerdo" class="oculto">
        <div class="contenido-modal">
            <span id="btn-cerrar">&times;</span>
            <div id="cuerpo-modal">
                <!-- El contenido dinámico (Fotos, Videos, Poemas) se inyecta aquí desde JS -->
            </div>
        </div>
    </div>

    <!-- ==========================================================================
       4. REPRODUCTOR ESTELAR FLOTANTE (PLAYLIST)
       ========================================================================== -->
    <div id="reproductor-estelar" class="music-player">
        <div class="track-info">
            <span id="player-titulo">Sintonía Cósmica</span>
        </div>
        <div class="player-controls">
            <button id="btn-prev" class="player-btn">⏮</button>
            <button id="btn-play-pause" class="player-btn">▶</button>
            <button id="btn-next" class="player-btn">⏭</button>
        </div>
    </div>

    <!-- Elemento de audio nativo controlado dinámicamente mediante JS -->
    <audio id="banda-sonora" loop playsinline></audio>

    <!-- ==========================================================================
       5. MAPEO DE IMPORTACIONES Y SCRIPTS MODULARES
       ========================================================================== -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module" src="js/recuerdos.js"></script>
    <script type="module" src="js/galaxia.js"></script>
    <script type="module" src="js/main.js"></script>

</body>
</html>
