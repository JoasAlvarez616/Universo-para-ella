<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Nuestro Universo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="bienvenida">
        <div class="contenido-bienvenida">
            <h1>Nuestro Universo</h1>
            <p>Un pequeño espacio en el cosmos dedicado a nosotros.</p>
            <button id="btn-entrar">Viajar al espacio</button>
        </div>
    </div>

    <div id="telon-interdimensional"></div>

    <div id="canvas-container"></div>

    <div id="modal-recuerdo" class="oculto">
        <div class="contenido-modal">
            <span id="btn-cerrar">&times;</span>
            <div id="cuerpo-modal"></div>
        </div>
    </div>

    <div id="reproductor-estelar" class="music-player">
        <div class="track-info">
            <span id="player-titulo">Sintonía Cósmica</span>
        </div>
        <div class="player-controls">
            <button id="btn-prev" class="player-btn">⏮</button>
            <button id="btn-play-pause" class="player-btn">▶</button>
            <button id="btn-next" class="player-btn">⏭</button>
        </div>
    </div>

    <div id="indicador-dimension" class="indicador-dimension">
        <span id="texto-dimension"></span>
    </div>

    <div class="mobile-controls">
        <button id="btn-acercar" class="ctrl-btn" title="Acercar">🔍</button>
        <button id="btn-alejar" class="ctrl-btn" title="Alejar">🔎</button>
        <button id="btn-reset-vista" class="ctrl-btn" title="Vista inicial">🏠</button>
    </div>

    <div class="keyboard-hint">
        🖱️ <span>Click</span> = Abrir recuerdo &nbsp;|&nbsp;
        <span>R</span> = Reset vista &nbsp;|&nbsp;
        <span>F</span> = Pantalla completa &nbsp;|&nbsp;
        <span>M</span> = Música &nbsp;|&nbsp;
        <span>← →</span> = Canciones
    </div>

    <audio id="banda-sonora" loop playsinline></audio>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module" src="js/recuerdos.js"></script>
    <script type="module" src="js/galaxia.js"></script>
    <script type="module" src="js/dimension2.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
